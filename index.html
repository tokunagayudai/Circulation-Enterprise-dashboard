<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enterprise Dashboard - CIRCULATION</title>
<style>
:root{--blue:#0079C0;--grn:#1a7f37;--grn-bg:#dafbe1;--org:#bf8700;--red:#cf222e;--purple:#7c3aed;
--bg:#f6f8fa;--bg2:#fff;--bd:#d0d7de;--ink:#1f2328;--ink2:#656d76;--ink3:#8b949e;
--mono:'SF Mono',Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:56px;background:#1a1f2e;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;z-index:100;overflow-y:auto}
.ni{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8b949e;font-size:18px;transition:.15s;flex-direction:column;gap:1px}
.ni .nl{font-size:7px;letter-spacing:.3px}
.ni:hover,.ni.act{background:var(--blue);color:#fff}
.logo-s{width:36px;height:36px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;margin-bottom:12px}
#M{margin-left:0;min-height:100vh;padding-top:52px}
/* Top navigation bar with 2 major categories */
.topnav{position:fixed;top:0;left:0;right:0;height:52px;background:#1a1f2e;display:flex;align-items:stretch;z-index:200;padding:0;gap:0}
.topnav .tn-logo{color:#fff;font-weight:900;font-size:14px;background:var(--blue);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:8px 12px;flex-shrink:0}
.tn-section{display:flex;flex-direction:column;padding:4px 16px;position:relative;min-width:0}
.tn-section.biz{background:rgba(239,68,68,.08);border-right:1px solid rgba(255,255,255,.05)}
.tn-section.ap{background:rgba(14,165,233,.06)}
.tn-section.biz::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:#ef4444}
.tn-section.ap::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:#0ea5e9}
.tn-section .tn-label{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.8px;font-weight:700;margin-top:4px;margin-bottom:2px;text-transform:uppercase}
.tn-section.biz .tn-label{color:#ef4444}.tn-section.ap .tn-label{color:#0ea5e9}
.tn-section .tn-btns{display:flex;gap:4px}
.topnav .tn-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.55);transition:.15s;border:none;background:none;white-space:nowrap}
.topnav .tn-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.tn-section.biz .tn-btn.act{color:#fff;background:#ef4444}
.tn-section.ap .tn-btn.act{color:#fff;background:#0ea5e9}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 8px;flex-wrap:wrap;gap:8px}
.title{font-size:18px;font-weight:700}.sub{font-size:11px;color:var(--ink3);margin-top:2px}
.filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fl{padding:5px 10px;border:1px solid var(--bd);border-radius:6px;font-size:11px;background:var(--bg2);color:var(--ink);cursor:pointer}
.fl:focus{outline:none;border-color:var(--blue)}

/* === Rakuten-style KPI with cumulative + delta === */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:8px 24px}
.kpi-card{background:var(--bg2);border-radius:10px;padding:14px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
.kpi-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,121,192,.08)}
.kpi-label{font-size:10px;color:var(--ink3);margin-bottom:4px;font-weight:500}
.kpi-val{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1.1}
.kpi-delta{font-size:12px;font-weight:600;margin-top:3px;font-family:var(--mono)}
.kpi-delta.up{color:var(--grn)}.kpi-delta.neutral{color:var(--ink3)}
.kpi-sub{font-size:9px;color:var(--ink3);margin-top:2px}

/* Delta switcher - Rakuten toggle style */
.delta-sw{display:flex;gap:0;background:var(--bg);border-radius:6px;border:1px solid var(--bd);overflow:hidden;margin-left:auto}
.delta-sw .ds{padding:4px 10px;font-size:9px;cursor:pointer;color:var(--ink3);border-right:1px solid var(--bd);transition:.1s;white-space:nowrap}
.delta-sw .ds:last-child{border-right:none}
.delta-sw .ds:hover{color:var(--ink)}
.delta-sw .ds.act{background:var(--blue);color:#fff}

/* Charts & drill */
.rev-panel{background:var(--bg2);border-radius:10px;margin:8px 24px;padding:16px;border:1px solid rgba(0,0,0,.04)}
.rev-panel .hd{font-size:12px;font-weight:700;margin-bottom:12px}
.chart-area{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;cursor:pointer}
.bar-pair{display:flex;gap:1px;align-items:flex-end;width:100%}
.bar-pair .b{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:.2s}
.bar-lbl2{font-size:8px;color:var(--ink3);text-align:center;margin-top:3px}
.bar-val{font-size:7px;font-family:var(--mono);color:var(--ink2);text-align:center;margin-bottom:2px}
.bar-margin{font-size:7px;color:var(--org);font-weight:600;text-align:center}
.chart-legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--ink2)}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend .dot{width:8px;height:8px;border-radius:2px}
.drill{max-height:0;overflow:hidden;transition:.2s;margin:0 24px}.drill.show{max-height:3000px;overflow-y:auto}
.drill-hd{display:flex;gap:10px;font-size:9px;font-weight:600;color:var(--ink3);padding:8px 12px;border-bottom:1px solid var(--bd)}
.drill-row{display:flex;gap:10px;align-items:center;padding:7px 12px;font-size:11px;border-bottom:1px solid rgba(0,0,0,.03);cursor:pointer;transition:.08s}
.drill-row:hover{background:rgba(0,121,192,.04)}
.drill-row .co{min-width:80px;font-weight:600;color:var(--ink2);font-size:10px}
.drill-row .nm{min-width:70px;font-weight:600}.drill-row .th{color:var(--ink2);flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-row .dt{font-family:var(--mono);font-size:9px;color:var(--ink3)}.drill-row .sf{font-size:8px;color:var(--blue);font-weight:600}
.pill{font-size:8px;padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.pill-g{background:var(--grn-bg);color:var(--grn)}.pill-a{background:#e0f2fe;color:#0ea5e9}.pill-b{background:#ddf4ff;color:var(--blue)}.pill-o{background:#fff8c5;color:var(--org)}.pill-r{background:#ffebe9;color:var(--red)}.pill-ws{background:#f0e6ff;color:var(--purple)}
.rev-drill{max-height:0;overflow:hidden;transition:.2s;margin-top:8px}.rev-drill.show{max-height:2000px;overflow-y:auto}

/* Company grid - MF style */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;padding:8px 24px}
.co-card{background:var(--bg2);border-radius:10px;padding:14px 16px;cursor:pointer;border:1px solid transparent;transition:.15s}
.co-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,121,192,.08)}
.co-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.co-top img{width:28px;height:28px;border-radius:6px;object-fit:contain;background:var(--bg)}
.co-top .name{font-weight:700;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.co-top .fs{font-size:9px;color:var(--ink3)}
.co-metrics{display:flex;gap:0;border-top:1px solid rgba(0,0,0,.04);padding-top:8px}
.co-m{flex:1;text-align:center}.co-m .v{font-size:15px;font-weight:700;font-family:var(--mono);line-height:1.2}.co-m .l{font-size:8px;color:var(--ink3);margin-top:1px}
.co-m+.co-m{border-left:1px solid rgba(0,0,0,.04)}

/* Summary, Layer, Org */
.sum-row{display:flex;gap:0;background:var(--bg2);border-radius:10px;margin:8px 24px;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.sum-i{flex:1;text-align:center;padding:14px 8px;border-right:1px solid rgba(0,0,0,.04)}.sum-i:last-child{border-right:none}
.sum-i .v{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.2}.sum-i .l{font-size:9px;color:var(--ink3);margin-top:3px}
.layer-panel{background:var(--bg2);border-radius:10px;margin:8px 24px;padding:12px 16px;display:flex;align-items:center;gap:16px;border:1px solid rgba(0,0,0,.04)}
.layer-panel .hd{font-size:11px;font-weight:700;color:var(--ink2)}
.ly-i{text-align:center;padding:0 12px}.ly-i .v{font-size:18px;font-weight:700;font-family:var(--mono)}.ly-i .l{font-size:8px;color:var(--ink3)}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:6px 24px;font-size:9px;color:var(--ink2)}
.lg-i{display:flex;align-items:center;gap:3px}.lg-d{width:8px;height:8px;border-radius:2px}
.dz{margin:8px 24px;padding:20px;text-align:center;border:2px dashed var(--bd);border-radius:10px;color:var(--ink3);cursor:pointer;transition:.15s;font-size:12px}
.dz:hover{border-color:var(--blue);color:var(--blue)}
.an{display:none;margin:8px 24px;padding:14px;background:var(--bg2);border-radius:10px;font-size:12px;line-height:1.6;border:1px solid rgba(0,0,0,.04)}.an.show{display:block}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ck-ring-anim{animation:ckRingPulse 2s ease-in-out infinite}@keyframes ckRingPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(26,127,55,.3))}50%{filter:drop-shadow(0 0 10px rgba(26,127,55,.6))}}
.hint{padding:4px 24px;font-size:9px;color:var(--ink3)}
.drill-modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9998;animation:fadeIn .15s}
.drill-modal{position:fixed;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:9999;display:flex;flex-direction:column;animation:drillSlide .2s ease-out;resize:both;overflow:hidden;min-width:400px;min-height:300px}
@keyframes drillSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.drill-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;cursor:move;user-select:none;background:#fafbfc}
.drill-modal-body{overflow:auto;padding:0;flex:1}
.drill-close{font-size:20px;width:32px;height:32px;border:none;background:rgba(0,0,0,.06);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:.15s}.drill-close:hover{background:rgba(0,0,0,.12)}

/* Org chart */
.org-toolbar{display:flex;gap:6px;padding:6px 24px;align-items:center;flex-wrap:wrap}
.org-toolbar span{font-size:10px;color:var(--ink2);font-weight:700}
.org-toolbar button{padding:3px 10px;font-size:9px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);cursor:pointer;color:var(--ink2)}
.org-toolbar button:hover{border-color:var(--blue);color:var(--blue)}
.org-toolbar .saved{font-size:9px;color:var(--grn);font-weight:600;opacity:0;transition:.3s}.org-toolbar .saved.show{opacity:1}
.dept-filter{display:flex;gap:4px;padding:4px 24px;flex-wrap:wrap}
.dept-btn{padding:3px 8px;font-size:9px;border:1px solid var(--bd);border-radius:12px;background:var(--bg2);cursor:pointer;color:var(--ink2);transition:.1s}
.dept-btn:hover{border-color:var(--blue)}.dept-btn.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.org-canvas{padding:8px 24px 16px;overflow-x:auto;overflow-y:auto;max-height:70vh;-webkit-overflow-scrolling:touch}
.org-root{display:flex;gap:16px;flex-wrap:nowrap;align-items:flex-start;min-width:max-content}
.dc-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
.dc{background:var(--bg2);border-radius:10px;border:1px solid var(--bd);min-width:170px;max-width:420px;transition:.15s;cursor:grab;user-select:none}
.dc:active{cursor:grabbing}
.dc.drag-over-dc{border:2px dashed var(--blue);background:rgba(0,121,192,.03)}
.dc.depth0{border-color:rgba(0,0,0,.08)}.dc.depth1{border-color:rgba(0,121,192,.2)}.dc.depth2{border-color:rgba(191,135,0,.2)}
.dc.grp-co{border:2px solid var(--blue);background:rgba(0,121,192,.03)}
.dc.grp-co>.dc-hd{background:rgba(0,121,192,.08);border-radius:9px 9px 0 0}
.dc-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.04)}
.dc-hd.has-won{background:var(--grn-bg);border-radius:9px 9px 0 0}
.dc-nm{font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-ct{font-size:9px;color:var(--ink3)}
.dc-body{padding:6px}
.dc-people{display:flex;flex-direction:column;gap:3px}
.pc{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.08s;font-size:11px}
.pc:hover{box-shadow:0 1px 4px rgba(0,0,0,.08)}
.pc[draggable=true]{cursor:grab}.pc[draggable=true]:active{cursor:grabbing}
.pc.dragging{opacity:.3}
.sw3{background:rgba(26,127,55,.06)}.sa3{background:rgba(14,165,233,.08)}.sm3{background:rgba(191,135,0,.06)}.sd3{background:rgba(0,121,192,.06)}.sp3{background:rgba(210,153,34,.06)}
.sc3{background:rgba(139,148,158,.04)}.sx3{background:rgba(207,34,46,.04)}.sr3{background:transparent}
.pa{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.pi{min-width:0;flex:1}.pi-n{font-weight:600;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-r{font-size:8px;color:var(--ink2)}.pi-d{font-size:7px;color:var(--ink3);font-family:var(--mono)}
.ps{flex-shrink:0}
.dc-children{display:flex;gap:12px;justify-content:center;padding-top:20px;position:relative}
.dc-children::before{content:'';position:absolute;top:0;left:50%;width:0;height:20px;border-left:2px solid var(--bd)}
.dc-children>.dc-wrap{position:relative}
.dc-children>.dc-wrap::before{content:'';position:absolute;top:-20px;left:0;right:0;height:20px;border-top:2px solid var(--bd)}
.dc-children>.dc-wrap:first-child::before{left:50%;border-left:2px solid var(--bd)}
.dc-children>.dc-wrap:last-child::before{right:50%;left:0;border-right:2px solid var(--bd)}
.dc-children>.dc-wrap:only-child::before{left:50%;right:auto;width:0;border-left:2px solid var(--bd);border-top:none}
.dc-children>.dc-wrap:not(:first-child):not(:last-child)::before{border-top:2px solid var(--bd)}
.dc-drop{min-height:20px;border:1px dashed transparent;border-radius:6px;margin:4px 6px;transition:.15s}
.dc-drop.active{border-color:var(--blue);background:rgba(0,121,192,.06)}

/* Memo popup */
.memo-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center}
.memo-panel{background:#fff;border-radius:12px;width:400px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:20px}
.memo-panel h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.memo-field{margin-bottom:12px}.memo-field label{display:block;font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.memo-field textarea{width:100%;border:1px solid var(--bd);border-radius:6px;padding:8px;font-size:12px;font-family:var(--sans);resize:vertical;min-height:60px}
.memo-field select{width:100%;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:12px;background:#fff}
.memo-field input[type=text]{width:100%;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:12px}
.memo-btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.memo-btn{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--ink)}
.memo-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.memo-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.memo-tag{font-size:7px;padding:1px 4px;border-radius:3px;cursor:pointer;margin-left:2px}
.memo-tag.has{background:#e0f2fe;color:#0ea5e9}.memo-tag.empty{background:var(--bg);color:var(--ink3)}
.memo-preview{position:absolute;z-index:999;background:#1a1f2e;color:#fff;font-size:10px;padding:8px 10px;border-radius:6px;max-width:220px;line-height:1.5;pointer-events:none;white-space:pre-wrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
/* List view */
.list-view{padding:8px 24px}
.list-table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.list-table th{font-size:9px;font-weight:600;color:var(--ink3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--bg)}
.list-table td{font-size:11px;padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.03)}
.list-table tr:hover{background:rgba(0,121,192,.03)}
.list-table .memo-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:var(--ink2)}
.view-toggle{display:flex;gap:0;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-left:8px}
.vt-btn{padding:4px 10px;font-size:9px;cursor:pointer;color:var(--ink3);border-right:1px solid var(--bd);transition:.1s}
.vt-btn:last-child{border-right:none}
.vt-btn:hover{color:var(--ink)}.vt-btn.act{background:var(--blue);color:#fff}
/* === Enterprise Analytics === */
.ent-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 8px;flex-wrap:wrap;gap:8px}
.ent-hdr h2{font-size:18px;font-weight:700}.ent-hdr .sub{font-size:11px;color:var(--ink3)}
.ent-tabs{display:flex;gap:2px;padding:4px 24px 8px;flex-wrap:wrap}
.ent-tab{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--ink2);transition:.15s}
.ent-tab:hover{border-color:var(--blue);color:var(--blue)}.ent-tab.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.ent-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:8px 24px}
.ent-kpi{background:var(--bg2);border-radius:10px;padding:14px 16px;border:1px solid transparent;transition:.15s}
.ent-kpi .ek-label{font-size:9px;color:var(--ink3);font-weight:500;margin-bottom:4px}
.ent-kpi .ek-val{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1.1}
.ent-kpi .ek-sub{font-size:10px;color:var(--ink3);margin-top:4px}.ent-kpi .ek-rate{font-size:11px;font-weight:600;margin-top:2px}
.ent-kpi .ek-rate.up{color:var(--grn)}.ent-kpi .ek-rate.down{color:var(--red)}
.ent-section{margin:8px 24px;background:var(--bg2);border-radius:10px;padding:16px;border:1px solid rgba(0,0,0,.04)}
.ent-section .es-title{font-size:12px;font-weight:700;margin-bottom:10px}
.ent-table{width:100%;border-collapse:collapse;font-size:11px}
.ent-table th{text-align:left;padding:6px 8px;color:var(--ink3);font-size:9px;font-weight:600;border-bottom:1px solid var(--bd)}
.ent-table td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.03)}.ent-table tr:hover{background:rgba(0,121,192,.03)}
.ent-heat{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);min-width:36px;text-align:center}
.ent-heat.g{background:var(--grn-bg);color:var(--grn)}.ent-heat.y{background:#fff8c5;color:var(--org)}.ent-heat.r{background:#ffebe9;color:var(--red)}.ent-heat.x{background:var(--bg);color:var(--ink3)}

function eDetect(h){var m={};var kw={member:['^主担当者$'],name:['^案件名$'],lastPh:['^最終到達'],apDate:['^初回アポ'],mendanDate:['^面談日$'],closeDate:['^受注予定日'],dealType:['^新規[/／]継続'],channel:['^施策区分'],ck:['^#?\\s*CK$','^CK$','^#\\s*CK$'],deadReason:['^DEAD理由$'],startDate:['^契約開始'],endDate:['^契約終了'],billM:['月額.*顧客請求','月額.*請求'],payM:['月額.*専門家','月額.*支払'],cancel:['^解約日$'],oppId:['^案件\\s?ID$','Opportunity ID'],mfj:['^Manager Forecast Judge$','^Manager Forecast'],recycle:['^リサイクル選択'],proposalDate:['人選結果メール初回送付日','人選結果メール','提案実施日','提案日'],jinsen:['^人選$','^人選ステータス'],nextAct:['^ネクストアクション$'],nextDate:['^ネクストアクション実施日'],mutual:['Mutual Close'],copyCancel:['^コピー元案件解約チェック','コピー元.*解約'],cancelStatus:['^解約承認ステータス'],cancelMinusCK:['^解約時.*CK','解約時マイナス'],focus:['^注力案件$'],contractClass:['^契約クラス$'],proposalClass:['^提案クラス$']};for(var k in kw){m[k]=-1;for(var w=0;w<kw[k].length;w++){for(var i=0;i<h.length;i++){var hvs=(h[i]||'').toString().trim();if(hvs.match(new RegExp(kw[k][w]))){m[k]=i;break;}}if(m[k]>=0)break;}}
  // curPh: 「フェーズ」単体（「最終到達フェーズ」は除外）
  m.curPh=-1;for(var i=0;i<h.length;i++){var hv=h[i].trim();if(hv==='フェーズ'||(hv.indexOf('フェーズ')>=0&&hv.indexOf('最終')<0&&hv.indexOf('到達')<0)){m.curPh=i;break;}}
  console.log('COL_MAP:',JSON.stringify({ck:m.ck,mfj:m.mfj,curPh:m.curPh,cancel:m.cancel,cancelStatus:m.cancelStatus}));

function eGet(r,k){var i=E_COL[k];return i>=0&&i<r.length?r[i].trim():'';}
function eGetN(r,k){var v=parseFloat(eGet(r,k).replace(/[,¥\s]/g,''));return isNaN(v)?0:v;}
function eYM(d){return d?d.substring(0,7):'';}
function eFmt(v){if(!v||v===0)return '0';var k=Math.round(v/1000);var neg=k<0;k=Math.abs(k);return (neg?'-':'')+k.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}

// 解約→再計上の二重計上を防ぐフィルタ
// ルール: 解約日が過去 かつ 解約承認ステータス=「承認済」のみ → 再計上案件に置き換わってるので非表示
//       （「マネージャ承認待」「承認前」は解約申請中だが確定していないので残す）
function eIsActiveCase(r){
  var cancelDate=eGet(r,'cancel');
  if(!cancelDate)return true;// 解約日なし=生きてる
  var cs=eGet(r,'cancelStatus');
  // 解約承認済 AND 解約日が今日以前 → 非表示（再計上側でカウント済み）
  if(cs&&cs.indexOf('承認済')>=0){
    var cd=new Date(cancelDate.replace(/\//g,'-'));
    var today=new Date();today.setHours(0,0,0,0);
    if(!isNaN(cd)&&cd<=today)return false;
  }
  return true;
}

    fetch(GAS_URL+'?sheet=all_cases').then(function(r){return r.text();}).catch(function(){return '';}),
    fetch(GAS_URL+'?sheet=juchu').then(function(r){return r.text();}).catch(function(){return '';}),
    fetch(GAS_URL+'?sheet=pn').then(function(r){return r.text();}),

// === 予算データのパース ===
// yosanシート = SF「商況管理シート簡易版」
// フェーズ=「予算」行→担当者CK予算 / それ以外→案件行(受注済CK/パイプライン等)
function eParseYosan(){
  if(!E_YOSAN||E_YOSAN.length===0||!E_YOSAN_H)return null;
  var h=E_YOSAN_H;
  var col={budget:-1,jisseki:-1,tasseiYosoku:-1,saizenYosoku:-1,pipeline:-1,kitaiShuueki:-1,name:-1,member:-1,phase:-1,mfj:-1};
  for(var i=0;i<h.length;i++){
    var hv=(h[i]||'').toString().trim();
    if(hv==='予算'||hv==='CK予算')col.budget=i;
    else if(hv.match(/受注済/))col.jisseki=i;
    else if(hv.match(/最善/))col.saizenYosoku=i;
    else if(hv.match(/達成予測/))col.tasseiYosoku=i;
    else if(hv.match(/パイプライン/))col.pipeline=i;
    else if(hv.match(/期待収益/))col.kitaiShuueki=i;
    else if(hv==='案件名')col.name=i;
    else if(hv.match(/担当者|主担当/))col.member=i;
    else if(hv==='フェーズ')col.phase=i;
    else if(hv.match(/Manager Forecast|MFJ|解約リスク/))col.mfj=i;
  }
  if(col.member<0||col.phase<0){console.warn('Yosan: 担当者 or フェーズ not found');return null;}
  function num(r,c){return c>=0?parseFloat(((r[c]||'0').toString()).replace(/[,¥\s円]/g,''))||0:0;}
  var byMember={};var team={budget:0,jisseki:0,tasseiYosoku:0,saizenYosoku:0,pipeline:0,kitaiShuueki:0};
  function init(m){if(!byMember[m])byMember[m]={budget:0,jisseki:0,tasseiYosoku:0,saizenYosoku:0,pipeline:0,kitaiShuueki:0,deals:[]};}
  var rowCount=0,budgetRows=0,dealRows=0;
  E_YOSAN.forEach(function(r,idx){
    rowCount++;
    var mem=(r[col.member]||'').toString().trim();
    var ph=(r[col.phase]||'').toString().trim();
    if(!mem)return;
    if(ph==='予算'||ph.toLowerCase()==='budget'){
      init(mem);byMember[mem].budget+=num(r,col.budget);team.budget+=num(r,col.budget);budgetRows++;return;
    }
    init(mem);
    var j=num(r,col.jisseki);
    byMember[mem].jisseki+=j;
    byMember[mem].tasseiYosoku+=num(r,col.tasseiYosoku);
    byMember[mem].saizenYosoku+=num(r,col.saizenYosoku);
    byMember[mem].pipeline+=num(r,col.pipeline);
    byMember[mem].kitaiShuueki+=num(r,col.kitaiShuueki);
    if(j>0)byMember[mem].deals.push({row:idx+2,ck:j,phase:ph});
    dealRows++;
  });
  for(var m in byMember){
    team.jisseki+=byMember[m].jisseki;
    team.tasseiYosoku+=byMember[m].tasseiYosoku;
    team.saizenYosoku+=byMember[m].saizenYosoku;
    team.pipeline+=byMember[m].pipeline;
    team.kitaiShuueki+=byMember[m].kitaiShuueki;
  }
  console.log('Yosan: budget='+Math.round(team.budget/1000)+'k jisseki='+Math.round(team.jisseki/1000)+'k members='+Object.keys(byMember).length);
  return{byMember:byMember,team:team};
}

// 実績CK計算: funnelシートから受注日ベースで月次集計
function eCalcActualCK(periodStart,periodEnd,memberFilter){
  var total=0;var byMember={};
  E_ROWS.forEach(function(r){
    var m=eGet(r,'member');if(!m)return;
    if(memberFilter&&memberFilter!=='all'&&m!==memberFilter)return;
    var cp=ePh(eGet(r,'curPh'));if(cp!==8)return;
    var clStr=eGet(r,'closeDate');if(!clStr)return;
    var cd=new Date(clStr.replace(/\//g,'-'));if(isNaN(cd))return;
    if(cd>=periodStart&&cd<=periodEnd){
      var ck=eGetN(r,'ck');total+=ck;
      byMember[m]=(byMember[m]||0)+ck;
    }
  });
  return {total:total,byMember:byMember};
}
// Build funnel stats
function eBuildFunnel(rows,memberFilter){
  var stats={};
  rows.forEach(function(r){
    var m=eGet(r,'member');if(!m)return;
    var dt=eGet(r,'dealType');if(dt.indexOf('継続')>=0)return; // exclude continuations
    if(memberFilter&&memberFilter!=='all'&&m!==memberFilter)return;
    if(!stats[m])stats[m]={p1:0,p2:0,p3:0,p4:0,p5:0,p7:0,p8:0,ck:0,dead:0,cases:[]};
    var lp=ePh(eGet(r,'lastPh'));var cp=ePh(eGet(r,'curPh'));
    if(lp>=1)stats[m].p1++;if(lp>=2)stats[m].p2++;if(lp>=3)stats[m].p3++;
    if(lp>=4)stats[m].p4++;if(lp>=5)stats[m].p5++;if(lp>=7)stats[m].p7++;
    if(lp>=8){stats[m].p8++;stats[m].ck+=eGetN(r,'ck');}
    if(lp===-1)stats[m].dead++;
    // Pipeline: active cases (not DEAD, not P8)
    if(cp>0&&cp<8)stats[m].cases.push({name:eGet(r,'name'),ph:cp,ck:eGetN(r,'ck'),member:m,apDate:eGet(r,'apDate')});
  });
  return stats;
}
// Build team totals
function eTeamTotal(stats){
  var t={p1:0,p2:0,p3:0,p4:0,p5:0,p7:0,p8:0,ck:0,dead:0,cases:[]};
  for(var m in stats){if(m===E_MGR)continue;var s=stats[m];t.p1+=s.p1;t.p2+=s.p2;t.p3+=s.p3;t.p4+=s.p4;t.p5+=s.p5;t.p7+=s.p7;t.p8+=s.p8;t.ck+=s.ck;t.dead+=s.dead;t.cases=t.cases.concat(s.cases);}
  return t;
}
function ePct(a,b){return b>0?Math.round(a/b*100):0;}
// Helper: extract typed fields from a pn row using auto-detected E_PN_COL
function pnRow(r){
  var c=window.E_PN_COL||{};

    bill:bill,pay:pay,start:gf('startDate').trim(),end:gf('endDate').trim(),cancel:gf('cancel').trim()};

// pn_new月別集計: 精緻な売上データから月別rev/pk/pnを生成
function ePnNewMonthly(mfFilter){
  var data=window.E_PN_NEW;var col=window.E_PN_NEW_COL;
  if(!data||!col||col.ym<0)return null;
  var TEAM_NAMES=['徳永','栫','中村','岡部','福本','飯田'];
  var byMonth={};var seen={};
  data.forEach(function(r){
    var member=(col.member>=0?(r[col.member]||''):'').toString().trim();
    var isTeam=false;TEAM_NAMES.forEach(function(t){if(member.indexOf(t)>=0)isTeam=true;});
    if(!isTeam)return;
    if(mfFilter&&mfFilter!=='all'&&member.indexOf(mfFilter.split(' ')[0])<0)return;
    var ym=(col.ym>=0?(r[col.ym]||''):'').toString().trim();
    if(!ym||ym.length<6)return;
    // 対象年月を YYYY/MM形式に正規化
    ym=ym.replace(/-/g,'/');if(ym.length===7)ym=ym;else if(ym.length===6)ym=ym.substring(0,4)+'/'+ym.substring(4);
    var bill=parseInt(((col.bill>=0?(r[col.bill]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    var payV=parseInt(((col.pay>=0?(r[col.pay]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    var pk=parseInt(((col.pk>=0?(r[col.pk]||'0'):'0').toString()).replace(/[,\s¥円]/g,''))||0;
    if(pk===0&&bill>0)pk=bill-payV;
    var oppId=(col.oppId>=0?(r[col.oppId]||''):'').toString().trim();
    if(!byMonth[ym])byMonth[ym]={rev:0,pk:0,pn:0,cases:[]};
    byMonth[ym].rev+=bill;
    byMonth[ym].pk+=pk;
    // PN数: 同月同案件は1回だけカウント
    var pnKey=ym+'_'+oppId;
    if(oppId&&!seen[pnKey]){seen[pnKey]=true;byMonth[ym].pn++;}
    else if(!oppId)byMonth[ym].pn++;
    byMonth[ym].cases.push({member:member,account:(col.account>=0?(r[col.account]||''):'').toString(),name:(col.name>=0?(r[col.name]||''):'').toString(),bill:bill,pk:pk});
  });
  return byMonth;
}
// PN stats (active projects) - monthly forecast
function eBuildPN(){
  // pn_newがあれば精緻データを優先
  var pnNew=ePnNewMonthly();
  if(pnNew){
    var today=new Date();var ym=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
    var d=pnNew[ym]||{rev:0,pk:0,pn:0};
    console.log('eBuildPN: pn_new使用 '+ym+' rev='+Math.round(d.rev/1000)+'k pk='+Math.round(d.pk/1000)+'k pn='+d.pn);
    return{pn:d.pn,rev:d.rev,pk:d.pk,source:'pn_new'};
  }
  // フォールバック: 従来のpnシートから計算
  var rev=0,pay=0,pn=0,seen={};
  var col=window.E_PN_COL||{};var today=new Date();
  E_PN2.forEach(function(r){
    if(col.phase>=0){var ph=(r[col.phase]||'').toString();if(!ph||ph.indexOf('08')<0)return;}
    var aid=col.oppId>=0?(r[col.oppId]||'').toString().trim():'';
    if(aid){if(seen[aid])return;seen[aid]=true;}
    var start=col.startDate>=0?(r[col.startDate]||'').toString().trim():'';
    var end=col.endDate>=0?(r[col.endDate]||'').toString().trim():'';
    var cancel=col.cancel>=0?(r[col.cancel]||'').toString().trim():'';
    if(cancel&&cancel.length>=7){var cd=new Date(cancel.replace(/\//g,'-'));var ed2=new Date(end.replace(/\//g,'-'));if(!isNaN(cd)&&!isNaN(ed2)&&cd<ed2)end=cancel;}
    if(!start||!end)return;
    var sd=new Date(start.replace(/\//g,'-')),ed=new Date(end.replace(/\//g,'-'));
    if(today>=sd&&today<=ed){pn++;var billV=col.bill>=0?parseInt(((r[col.bill]||'0').toString()).replace(/[,¥\s円]/g,''))||0:0;var payV=col.pay>=0?parseInt(((r[col.pay]||'0').toString()).replace(/[,¥\s円]/g,''))||0:0;rev+=billV;pay+=payV;}
  });
  return{pn:pn,rev:rev,pk:rev-pay,source:'pn'};
}
// Revenue forecast per month (next 6 months)
function eAddMonth(ym,n){var p=ym.split('/');var d=new Date(parseInt(p[0]),parseInt(p[1])-1+n,1);return d.getFullYear()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);}
function eBuildRevForecast(){
  var today=new Date();var todayYM=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  var months=[];for(var i=0;i<7;i++)months.push(eAddMonth(todayYM,i));
  var base={};months.forEach(function(m){base[m]={rev:0,pk:0,pn:0,ending:0};});
  var seen={};
  var col=window.E_PN_COL||{};
  E_PN2.forEach(function(r){
    if(col.phase>=0){var ph=gv(r,col.phase);if(!ph||ph.indexOf('08')<0)return;}
    var p=pnRow(r);
    if(!p.oppId||seen[p.oppId])return;seen[p.oppId]=true;
    var end=p.end;
    if(p.cancel&&p.cancel.length>=7){var cd2=new Date(p.cancel.replace(/\//g,'-'));var ed3=new Date(end.replace(/\//g,'-'));if(!isNaN(cd2)&&!isNaN(ed3)&&cd2<ed3)end=p.cancel;}
    if(!p.start||!end)return;var sYM=p.start.substring(0,7),eYM2=end.substring(0,7);
    if(p.bill<=0&&p.pay<=0)return;
    months.forEach(function(m){
      if(sYM<=m&&eYM2>=m){base[m].rev+=p.bill;base[m].pk+=(p.bill-p.pay);base[m].pn++;}
      if(eYM2===m)base[m].ending++;
    });
  });
  return{months:months,base:base,todayYM:todayYM};
}

// === localStorage-backed next action management for stalled cases ===
function entGetAction(oppId){try{var d=JSON.parse(localStorage.getItem('ent_act_'+oppId)||'{}');return d;}catch(e){return{};}}
function entSetAction(oppId,data){try{localStorage.setItem('ent_act_'+oppId,JSON.stringify(data));}catch(e){}}
// Auto-revive logic: if NA date is past, consider the item as "not done" for display
function entIsActiveParked(oppId){
  var d=entGetAction(oppId);
  if(!d.done)return false;
  // If date set and date <= today → NOT parked anymore (revived)
  if(d.date){
    var today=new Date();today.setHours(0,0,0,0);
    var nad=new Date(d.date);nad.setHours(0,0,0,0);
    if(nad<=today)return false;
  }
  return true;
}
function entUpdateActionDate(oppId,date){var d=entGetAction(oppId);d.date=date;d.updatedAt=new Date().toISOString();entSetAction(oppId,d);renderEnt();}
function entToggleActionDone(oppId){var d=entGetAction(oppId);d.done=!d.done;d.updatedAt=new Date().toISOString();entSetAction(oppId,d);renderEnt();}
function entUpdateActionMemo(oppId,memo){var d=entGetAction(oppId);d.memo=memo;d.updatedAt=new Date().toISOString();entSetAction(oppId,d);}
// Quick date setter (today / tomorrow / friday / next monday)
function entSetQuickDate(oppId,offset){
  var d=new Date();d.setDate(d.getDate()+offset);
  var ymd=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
  var data=entGetAction(oppId);data.date=ymd;data.done=true;data.updatedAt=new Date().toISOString();entSetAction(oppId,data);renderEnt();
}
// Clear all done flags (全件復活)
function entClearAllDone(){
  if(!confirm('対応済みにした全案件をリストに戻しますか？'))return;
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf('ent_act_')===0){
      try{var d=JSON.parse(localStorage.getItem(k)||'{}');d.done=false;localStorage.setItem(k,JSON.stringify(d));}catch(e){}
    }
  }
  renderEnt();
}

function eBuildStalled(){
  var today=new Date();var todayYM=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  var stalled=[],zombie=[];
  E_ROWS.forEach(function(r){
    var cpRaw=eGet(r,'curPh');
    if(cpRaw.indexOf('DEAD')>=0)return;
    var cp=ePh(cpRaw);
    if(cp<1||cp>=8)return;
    var dt=eGet(r,'dealType');if(dt.indexOf('継続')>=0)return;
    var apDate=eGet(r,'apDate');if(!apDate)return;
    var ap=new Date(apDate.replace(/\//g,'-'));if(isNaN(ap))return;
    var days=Math.floor((today-ap)/(1000*60*60*24));
    // P1: 初回アポから3日以上経過してもP1のままなら滞留扱い（SF移行漏れの可能性）
    var closeDate=eGet(r,'closeDate');var closeYM=eYM(closeDate);
    var item={name:eGet(r,'name'),member:eGet(r,'member'),ph:cp,days:days,apDate:apDate,ck:eGetN(r,'ck'),closeDate:closeDate,closeYM:closeYM,oppId:eGet(r,'oppId'),dealType:eGet(r,'dealType'),mfj:eGet(r,'mfj'),nextAct:eGet(r,'nextAct'),nextDate:eGet(r,'nextDate'),mutual:eGet(r,'mutual'),jinsen:eGet(r,'jinsen')};
    // Zombie: closeDate in the past (before this month) - likely forgotten/should be DEAD
    if(closeYM&&closeYM<todayYM){zombie.push(item);return;}
    stalled.push(item);
  });
  stalled.sort(function(a,b){return a.ph===b.ph?b.days-a.days:a.ph-b.ph;});
  zombie.sort(function(a,b){return b.days-a.days;});
  return{stalled:stalled,zombie:zombie};
}
// === パイプライン売上予測（localStorage）読み取り ===
function eGetManualFcst(){
  var total=0;var items=[];
  E_ROWS.forEach(function(r){
    var cpRaw=eGet(r,'curPh');if(cpRaw.indexOf('DEAD')>=0)return;
    var cp=ePh(cpRaw);if(cp<1)return;
    var oppId=eGet(r,'oppId');if(!oppId)return;
    var v=0;try{v=parseInt(localStorage.getItem('ent_fcst_'+oppId)||'0')||0;}catch(e){}
    if(v>0){total+=v;items.push({oppId:oppId,member:eGet(r,'member'),name:eGet(r,'name'),fcst:v});}
  });
  return{total:total,items:items};
}
// === Global MFJ forecast helpers ===
function eMfjBreak(memberFilter,p8ckFromYosan){
  var today=new Date();var thisYM=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  var mfjMin=0,mfjMid=0,mfjMax=0;
  E_ROWS.forEach(function(r){
    if(memberFilter&&eGet(r,'member')!==memberFilter)return;
    var cpRaw=eGet(r,'curPh');if(cpRaw.indexOf('DEAD')>=0)return;
    var cp=ePh(cpRaw);if(cp<1||cp>=8)return;
    var clYM=eYM(eGet(r,'closeDate'));if(clYM!==thisYM)return;
    var mfj=eGet(r,'mfj').trim().toUpperCase();if(!mfj)return;
    var ck=eGetN(r,'ck');
    if(mfj==='MIN')mfjMin+=ck;else if(mfj==='MID')mfjMid+=ck;else if(mfj==='MAX')mfjMax+=ck;
  });
  var p8=p8ckFromYosan||0;
  return{min:p8+mfjMin,mid:p8+mfjMin+mfjMid,max:p8+mfjMin+mfjMid+mfjMax,p8ck:p8};
}

function buildMascotSummary(){
  if(!E_ROWS||E_ROWS.length===0)return '<div style="color:var(--ink3)">データ読込中...</div>';
  var today=new Date();var thisYM=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1);
  var todayStr=today.getFullYear()+'/'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1)+'/'+(today.getDate()<10?'0':'')+today.getDate();
  var mStart=new Date(today.getFullYear(),today.getMonth(),1);var mEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
  function inM(d){if(!d)return false;var v=new Date(d.replace(/\//g,'-'));return !isNaN(v)&&v>=mStart&&v<=mEnd;}
  function sameDay(dStr){if(!dStr)return false;return dStr.substring(0,10)===todayStr;}
  var _mbrNm=E_MEMBER_ORDER.filter(function(m){return m!==E_MGR;}).length;
  var _mbrPP=_mbrNm+(thisYM<E_MGR_KPI_END?1:0);
  // KPI集計
  var k={p1:0,is:0,fs:0,p3:0,p4:0,p8:0,ck:0,dead:0};
  var todayApo=[];var p23Cases=[];var nukemoreP1=[];var pastCloseCases=[];
  E_ROWS.forEach(function(r){
    var dt=eGet(r,'dealType');if(dt.indexOf('継続')>=0)return;
    var m=eGet(r,'member');
    var ap=eGet(r,'apDate'),md=eGet(r,'mendanDate'),cl=eGet(r,'closeDate'),pr=eGet(r,'proposalDate');
    var lp=ePh(eGet(r,'lastPh'));var cpR=eGet(r,'curPh');var cp=ePh(cpR);
    var ch=eGet(r,'channel');var name=eGet(r,'name');var oppId=eGet(r,'oppId');var ck=eGetN(r,'ck');
    if(inM(ap)){k.p1++;if(ch.indexOf('FS')>=0)k.fs++;else k.is++;if(cpR.indexOf('DEAD')>=0)k.dead++;}
    if(inM(pr)&&lp>=3)k.p3++;
    if(inM(md)&&lp>=4)k.p4++;
    if(inM(cl)&&cp===8){k.p8++;k.ck+=ck;}
    // 今日の初回アポ
    if(sameDay(ap))todayApo.push({name:name,member:m,oppId:oppId,ck:ck});
    // P2/P3案件（DEAD除外、受注予定日が今月以降）
    if(cpR.indexOf('DEAD')<0&&(cp===2||cp===3)){
      var clYM=cl?cl.substring(0,7):'';
      if(!clYM||clYM>=thisYM)p23Cases.push({name:name,member:m,oppId:oppId,ph:cp,ck:ck,closeDate:cl||'',days:ap?Math.floor((today-new Date(ap.replace(/\//g,'-')))/(86400000)):0});
    }
    // 更新漏れ1: アポ日が過去でまだP1
    if(cp===1&&cpR.indexOf('DEAD')<0&&ap){var apD=new Date(ap.replace(/\//g,'-'));if(!isNaN(apD)&&apD<today){var dd=Math.floor((today-apD)/86400000);if(dd>=1)nukemoreP1.push({name:name,member:m,oppId:oppId,days:dd,apDate:ap,ph:cp});}}
    // 更新漏れ2: 受注予定日が先月以前でP1-P7（DEAD処理漏れ or SF更新漏れ）
    if(cp>=1&&cp<=7&&cpR.indexOf('DEAD')<0&&cl){var clYM2=cl.substring(0,7);if(clYM2<thisYM){pastCloseCases.push({name:name,member:m,oppId:oppId,closeDate:cl,ph:cp,ck:ck});}}
  });
  nukemoreP1.sort(function(a,b){return b.days-a.days;});
  pastCloseCases.sort(function(a,b){return a.closeDate<b.closeDate?-1:1;});
  p23Cases.sort(function(a,b){return a.ph===b.ph?b.days-a.days:a.ph-b.ph;});
  // CK/予実
  var pn=eBuildPN();var yD=eParseYosan();
  var ckPct=0,ckBudget=0,ckJisseki=0;
  if(yD&&yD.team.budget>0){ckBudget=yD.team.budget;ckJisseki=yD.team.jisseki;ckPct=Math.round(ckJisseki/ckBudget*100);}
  // MFJ
  var teamMfj=eMfjBreak(null,(yD&&yD.team)?yD.team.jisseki:0);
  // 滞留（5日超）

  var h='';

  h+='<circle cx="30" cy="30" r="25" fill="none" stroke="'+ckC+'" stroke-width="5" stroke-dasharray="'+dA+' '+dR+'" stroke-linecap="round" transform="rotate(-90 30 30)"/>';
  h+='<text x="30" y="27" text-anchor="middle" font-size="10" font-weight="800" fill="'+ckC+'" font-family="var(--mono)">'+ckPct+'%</text>';
  h+='<text x="30" y="37" text-anchor="middle" font-size="6" fill="#656d76">CK達成</text>';
  h+='</svg>';
  h+='<div style="font-size:10px;color:var(--ink3)">'+eFmt(ckJisseki)+' / '+eFmt(ckBudget)+'</div>';
  h+='</div>';
  // ====== 2. MIN/MID/MAX ======
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:10px;text-align:center">';
  function mfjBox(l,v,c){var p=ckBudget>0?(v/ckBudget*100).toFixed(0)+'%':'-';return '<div style="background:var(--bg);border-radius:6px;padding:6px 4px;border-left:3px solid '+c+'"><div style="font-size:8px;color:var(--ink3)">'+l+'</div><div style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+c+'">'+eFmt(v)+'</div><div style="font-size:8px;color:var(--ink3)">'+p+'</div></div>';}
  h+=mfjBox('MIN',teamMfj.min,'#1a7f37');h+=mfjBox('MID',teamMfj.mid,'#bf8700');h+=mfjBox('MAX',teamMfj.max,'#cf222e');
  h+='</div>';
  // ====== 2.5 CKフォーキャスト表（メンバー別） ======
  if(yD&&yD.team.budget>0){
    var _th='style="font-size:8px;font-weight:700;padding:3px 4px;text-align:center;white-space:nowrap"';
    var _td='style="font-size:9px;padding:3px 4px;text-align:right;font-family:var(--mono)"';

    h+='<tr style="background:#1a1f2e;color:#fff"><td '+_th+'>名前</td><td '+_th+'>予算</td><td '+_th+' style="color:#ff6b6b">CK実績</td><td '+_th+' style="color:#ff6b6b">率</td><td '+_th+' style="color:#69b4ff">MIN</td><td '+_th+' style="color:#69b4ff">率</td><td '+_th+' style="color:#69b4ff">MID</td><td '+_th+' style="color:#69b4ff">率</td></tr>';
    function _pctS(v,b){if(!b||b<=0)return'-';var p=Math.round(v/b*100);var c=p>=100?'var(--grn)':p>=70?'var(--org)':'var(--red)';return '<span style="color:'+c+';font-weight:700">'+p+'%</span>';}
    // 合計行
    var yt=yD.team;var tmfj=eMfjBreak(null,yt.jisseki);
    h+='<tr style="background:#fff0f0;font-weight:700"><td style="font-size:9px;padding:3px 4px;font-weight:700">合計</td><td '+_td+'>'+eFmt(yt.budget)+'</td><td '+_td+' style="color:'+ckC+'">'+eFmt(yt.jisseki)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(yt.jisseki,yt.budget)+'</td><td '+_td+'>'+eFmt(tmfj.min)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(tmfj.min,yt.budget)+'</td><td '+_td+'>'+eFmt(tmfj.mid)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(tmfj.mid,yt.budget)+'</td></tr>';
    // メンバー行
    var memOrder=E_MEMBER_ORDER.slice();
    Object.keys(yD.byMember).forEach(function(m2){if(memOrder.indexOf(m2)<0)memOrder.push(m2);});
    memOrder.forEach(function(m2){
      var d=yD.byMember[m2];if(!d)d={budget:0,jisseki:0};
      var mm=eMfjBreak(m2,d.jisseki);
      var isMgr=m2===E_MGR;
      h+='<tr style="border-bottom:1px solid rgba(0,0,0,.05)'+(isMgr?';opacity:.5':'')+'"><td style="font-size:9px;padding:3px 4px;font-weight:600">'+m2.split(' ')[0]+'</td><td '+_td+'>'+eFmt(d.budget)+'</td><td '+_td+'>'+eFmt(d.jisseki)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(d.jisseki,d.budget)+'</td><td '+_td+'>'+eFmt(mm.min)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(mm.min,d.budget)+'</td><td '+_td+'>'+eFmt(mm.mid)+'</td><td style="font-size:9px;padding:3px 4px;text-align:center">'+_pctS(mm.mid,d.budget)+'</td></tr>';

// Period filter helper
function eGetPeriodRange(period){
  var today=new Date();var start,end=today;
  if(period==='this'){start=new Date(today.getFullYear(),today.getMonth(),1);}
  else if(period==='last'){start=new Date(today.getFullYear(),today.getMonth()-1,1);end=new Date(today.getFullYear(),today.getMonth(),0);}
  else if(period==='3m'){start=new Date(today.getFullYear(),today.getMonth()-2,1);}
  else if(period==='h2'){start=new Date(2026,1,1);} // 下期 2026/02-2026/07
  else if(period==='h1'){start=new Date(2025,7,1);end=new Date(2026,0,31);} // 上期 2025/08-2026/01
  else{start=new Date(2025,7,1);} // 今期全体
  return{start:start,end:end};
}
function eBuildFunnelP(rows,period,channel){
  var pr=eGetPeriodRange(period);
  var stats={};
  rows.forEach(function(r){
    var m=eGet(r,'member');if(!m)return;
    var dt=eGet(r,'dealType');if(dt.indexOf('継続')>=0)return;
    var apStr=eGet(r,'apDate');if(!apStr)return;
    var apD=new Date(apStr.replace(/\//g,'-'));if(isNaN(apD))return;
    if(period&&period!=='all'){if(apD<pr.start||apD>pr.end)return;}
    if(channel&&channel!=='all'){
      var ch=eGet(r,'channel');var isFS=ch.indexOf('FS')>=0;
      if(channel==='FS'&&!isFS)return;
      if(channel==='IS'&&isFS)return;
    }

    var rv={};if(coRev[co]){for(var mm in coRev[co]){var d2=coRev[co][mm];rv[mm]=[d2[0],d2[0]-d2[1],d2[2],d2[0]?Math.round((d2[0]-d2[1])/d2[0]*1000)/10:0];}}

        ctcts.forEach(function(ct3){if(ct3.n===c.lead||ct3.nr===c.lead){var dp=ct3.dept||'(不明)';wonDepts[dp]=true;}});
      }
    });
    // Build per-lead case list
    var leadCases={};cses.forEach(function(c){if(c.lead){if(!leadCases[c.lead])leadCases[c.lead]=[];leadCases[c.lead].push({t:c.theme,p:c.pn,d:c.date,ck:c.ck,aid:c.aid});}});
    output[co]={s:[ctcts.length,dO.length,nr.filter(function(c){return c.pn===8;}).length,cses.reduce(function(s,c){return s+c.ck;},0),tRv,tGP],cs:allCS,nl:allNL,d:dO,rev:rv,pnd:pnd2,f:coFS2[co]||'',logo:fLogo(co),
      won:{leads:Object.values(wonLeads),depts:Object.keys(wonDepts),cases:wonCases.map(function(c){return{n:c.lead,t:c.theme,ck:c.ck,d:c.date,aid:c.aid};})},
      lc:leadCases,
      layer:[l2,dO.filter(function(d3){return d3.lc>=2;}).length,dO.filter(function(d3){return['won','active','meeting','deal','prospect'].indexOf(d3.best)>=0;}).length,dO.length]};
  });
  var gm2={},gpn2={};
  var aM=new Set();for(var co3 in coRev)for(var mm3 in coRev[co3])aM.add(mm3);
  aM.forEach(function(m){var tr=0,tg=0,tc=0;for(var co4 in coRev){if(coRev[co4][m]){tr+=coRev[co4][m][0];tg+=coRev[co4][m][0]-coRev[co4][m][1];tc+=coRev[co4][m][2];}}gm2[m]=[tr,tg,tc,tr?Math.round(tg/tr*1000)/10:0];});
  for(var co5 in coPND){for(var mm5 in coPND[co5]){if(!gpn2[mm5])gpn2[mm5]=[];coPND[co5][mm5].forEach(function(p){gpn2[mm5].push({co:co5.replace(/株式会社/g,'').replace(/ホールディングス/g,'HD').slice(0,14),n:p.n,r:p.r,g:p.r-p.p,e:p.e});});}}
  console.log('GAS processed: companies='+Object.keys(output).length+', months with rev='+Object.keys(gm2).length);
  return{data:output,meta:{fs:Object.values(coFS2).filter(function(v,i,a){return a.indexOf(v)===i;}).sort(),gpn:gpn2,gm:gm2}};
  }catch(e){console.error('GAS process error:',e);return null;}
}
